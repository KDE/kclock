name: kclock
confinement: strict
grade: stable
base: core24
adopt-info: kclock

apps:
  kclockd:
    command: usr/bin/kclockd
    command-chain:
      - usr/bin/kclockd-command-chain.sh
    daemon: simple
    plugs:
      - network
      - network-bind

  kclock:
    extensions:
      - kde-neon-6
    common-id: org.kde.kclock
    desktop: usr/share/applications/org.kde.kclock.desktop
    command: usr/bin/kclock
    command-chain:
      - usr/bin/kclockd-command-chain.sh
    plugs:
      - home
slots:
  session-dbus-interface:
    interface: dbus
    name: org.kde.kclockd
    bus: session

parts:
  wayland:
    source: https://gitlab.freedesktop.org/wayland/wayland.git
    source-branch: 1.23
    plugin: meson
    build-snaps:
      - kde-qt6-core24-sdk/latest/beta
      - kf6-core24-sdk/latest/beta
    build-packages:
      - meson
      - pkgconf
      - xsltproc
      - xmlto
      - libexpat1-dev
      - libffi-dev
      - libxml2-dev
      - doxygen
      - graphviz
    build-environment:
      - PKG_CONFIG_PATH: "$CRAFT_STAGE/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/pkgconfig:/snap/kde-qt6-core24-sdk/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/pkgconfig:/snap/kf6-core24-sdk/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/pkgconfig"
  wayland-protocols:
    after:
      - wayland
    source: https://gitlab.freedesktop.org/wayland/wayland-protocols.git
    source-tag: 1.47
    plugin: meson
    build-snaps:
      - kde-qt6-core24-sdk/latest/beta
      - kf6-core24-sdk/latest/beta
    build-packages:
      - libwayland-dev
      - meson
      - pkgconf
    build-environment:
      - PKG_CONFIG_PATH: "$CRAFT_STAGE/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/pkgconfig:/snap/kde-qt6-core24-sdk/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/pkgconfig:/snap/kf6-core24-sdk/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/pkgconfig"
  libplasma:
    after: [wayland-protocols]
    source: https://invent.kde.org/plasma/libplasma.git
    source-branch: Plasma/6.6
    plugin: cmake
    build-packages:
      - libpulse0
      - rsync
    stage-packages:
      - libpulse0
    build-snaps:
      - kde-qt6-core24-sdk/latest/beta
      - kf6-core24-sdk/latest/beta
    cmake-generator: Ninja
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DQT_MAJOR_VERSION=6
      - -DENABLE_QT5=OFF
      - -DENABLE_QT6=ON
      - -DBUILD_TESTING=OFF
    override-build: |
      craftctl default
      rsync -a --ignore-existing $CRAFT_PART_INSTALL/ /
    prime:
      - -usr/bin/rsync

  plasma-mobile-sounds:
    source: https://invent.kde.org/plasma-mobile/plasma-mobile-sounds.git
    plugin: cmake
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
    build-snaps:
      - kde-qt6-core24-sdk/latest/beta
      - kf6-core24-sdk/latest/beta

  kclock:
    after: [plasma-mobile-sounds, libplasma]
    parse-info:
      - usr/share/metainfo/org.kde.kclock.appdata.xml
    plugin: cmake
    source: .
    source-type: local
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_TESTING=OFF
      - -DBUILD_TESTING=OFF
    build-snaps:
      - kde-qt6-core24-sdk/latest/beta
      - kf6-core24-sdk/latest/beta
    build-packages:
      - libpulse-dev
    override-build: |
      craftctl default
      cat <<EOF > $CRAFT_PART_INSTALL/usr/bin/kclockd-command-chain.sh
      #!/bin/sh
        exec \$SNAP/usr/bin/kclockd & exec "\$@"
      EOF
      chmod +x $CRAFT_PART_INSTALL/usr/bin/kclockd-command-chain.sh
    prime:
      - -usr/lib/*/cmake/*
      - -usr/include/*
      - -usr/share/ECM/*
      - -usr/share/man/*
      - -usr/bin/X11
      - -usr/lib/gcc/$CRAFT_ARCH_TRIPLET/6.0.0
      - -usr/lib/aspell/*
      - -usr/share/lintian
  gpu-2404:
    after: [kclock]
    source: https://github.com/canonical/gpu-snap.git
    plugin: dump
    override-prime: |
      craftctl default
      ${CRAFT_PART_SRC}/bin/gpu-2404-cleanup mesa-2404
    prime:
      - bin/gpu-2404-wrapper
